<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waveian - Som Infinito</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="search-container">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="O que vamos ouvir no Waveian?" autocomplete="off" />
      <button id="btnOpenLoginWizard" title="Perfil e Acesso">
        <div class="user-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </button>
    </div>
    <div id="suggestionsList" class="suggestions-list" style="display: none;"></div>
  </div>

  <div class="player-container">
    <img id="albumArt" src="placeholder.png" alt="Album Art" />
    <div class="track-info">
      <div id="trackTitle">Nenhuma música tocando</div>
      <div id="trackArtist">-</div>
      <div class="progress-wrapper">
        <span id="timeCurrent">0:00</span>
        <input type="range" id="progressSlider" min="0" max="100" value="0" />
        <span id="timeTotal">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button id="btnPrev">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button id="btnPlayPause">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" style="display: none;" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btnNext">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <div class="volume-wrapper">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
